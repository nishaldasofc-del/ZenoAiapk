name: Build ZenoAi APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Fix build.gradle
        run: |
          sed -i 's/isDebuggable/debuggable/g' app/build.gradle
          sed -i 's/isMinifyEnabled/minifyEnabled/g' app/build.gradle
          sed -i 's/isShrinkResources/shrinkResources/g' app/build.gradle
          sed -i '/applicationIdSuffix/d' app/build.gradle
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZenoAi-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
